repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff (zero-violation gate)
        entry: uv run ruff check --force-exclude
        language: system
        types: [python]
      - id: line-cap
        name: 150 effective-line cap
        entry: uv run python scripts/check_line_cap.py
        language: system
        pass_filenames: false
